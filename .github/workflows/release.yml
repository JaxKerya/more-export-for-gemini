# Release pipeline (#18): pushing a version tag runs the full test suite,
# builds the store zip and attaches it to a GitHub Release.
# Usage: git tag v2.2.0 && git push origin v2.2.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - uses: softprops/action-gh-release@v2
        with:
          files: store/*.zip
          generate_release_notes: true
