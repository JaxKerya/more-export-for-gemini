<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>More Export for Gemini</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <img src="../../icons/icon48.png" alt="" class="logo">
        <div class="header-text">
          <span class="title">More Export for Gemini</span>
          <span class="version" id="version"></span>
        </div>
      </div>
      <div class="status-pill" id="statusPill">
        <span class="status-dot" id="dot"></span>
        <span class="status-text" id="statusText"></span>
      </div>
    </header>

    <div class="stats-row" id="statsRow">
      <div class="stat">
        <span class="stat-value" id="formatCount">0</span>
        <span class="stat-label">Formats</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="clipboardCount">0</span>
        <span class="stat-label">Clipboard</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <span class="stat-value" id="citationLabel">Numbered</span>
        <span class="stat-label">Citation</span>
      </div>
    </div>

    <div class="beta-notice">
      <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
      <span>Beta release - some exports may not be fully stable yet. Please report any issues you run into.</span>
    </div>

    <div class="profile-row" id="profileRow" hidden>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
      <select id="profileSelect" aria-label="Export profile"></select>
      <button id="profileApplyBtn" type="button">Apply</button>
    </div>

    <div class="enabled-formats" id="enabledFormats"></div>

    <div class="actions">
      <a href="#" id="settingsLink" class="action-btn primary">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
        Settings
      </a>
      <a href="#" class="action-btn secondary" id="bugReportLink" title="Report a bug">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M20 8h-2.81a5.985 5.985 0 0 0-1.82-1.96L17 4.41 15.59 3l-2.17 2.17C12.96 5.06 12.49 5 12 5s-.96.06-1.41.17L8.41 3 7 4.41l1.62 1.63C7.88 6.55 7.26 7.22 6.81 8H4v2h2.09c-.05.33-.09.66-.09 1v1H4v2h2.09c.05.33.09.66.09 1v1H4v2h2.81c1.04 1.79 2.97 3 5.19 3s4.15-1.21 5.19-3H20v-2h-2.09c.05-.33.09-.66.09-1v-1h2v-2h-2v-1c0-.34-.04-.67-.09-1H20V8z"/></svg>
      </a>
      <a href="#" class="action-btn secondary" id="suggestionLink" title="Suggest a feature">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg>
      </a>
    </div>

    <div class="hint">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" opacity="0.5"><path d="M11 17h2v-6h-2v6zm1-15C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 9h2V7h-2v2z"/></svg>
      Right-click on any Gemini Deep Research page to export
    </div>
  </div>
  <script src="../lib/settings.js"></script>
  <script src="../lib/links.js"></script>
  <script src="popup.js"></script>
</body>
</html>
